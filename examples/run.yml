name: Ogoron Run

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OGORON_CLI_VERSION: 5.2.0
  OGORON_BUNDLE_URL: https://github.com/OgoronAI/ogoron-cli/releases/download/v5.2.0/ogoron-linux-amd64.tar.gz

jobs:
  prepare-ui-runtime:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ogoron
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ogoron"
          curl -fsSL "$OGORON_BUNDLE_URL" -o "$RUNNER_TEMP/ogoron/ogoron-linux-amd64.tar.gz"
          tar -xzf "$RUNNER_TEMP/ogoron/ogoron-linux-amd64.tar.gz" -C "$RUNNER_TEMP/ogoron"
          echo "$RUNNER_TEMP/ogoron/runtime" >> "$GITHUB_PATH"

      - name: Ensure repository is bootstrapped
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .ogoron && ! -d .ai-agents ]]; then
            echo "Ogoron is not initialized in this repository. Run the setup workflow first." >&2
            exit 1
          fi

      - name: Restore UI runtime cache
        id: restore-ui-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .ogoron/tests/.venv
            ~/.cache/ms-playwright
          key: ${{ format('ogoron-ui-{0}-{1}-{2}', runner.os, env.OGORON_CLI_VERSION, hashFiles('.ogoron/tests/pyproject.toml')) }}

      - name: Prepare UI workspace
        env:
          OGORON_REPO_TOKEN: ${{ secrets.OGORON_REPO_TOKEN }}
          OGORON_LLM_API_KEY: ${{ secrets.OGORON_LLM_API_KEY }}
        run: |
          # bootstrap-runtime and smoke-check are enabled by default already.
          ogoron-nuitka prepare ui-workspace --populate-support-mode never

      - name: Save UI runtime cache
        if: ${{ steps.restore-ui-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            .ogoron/tests/.venv
            ~/.cache/ms-playwright
          key: ${{ format('ogoron-ui-{0}-{1}-{2}', runner.os, env.OGORON_CLI_VERSION, hashFiles('.ogoron/tests/pyproject.toml')) }}

  run-tests:
    runs-on: ubuntu-latest
    needs: prepare-ui-runtime

    steps:
      - uses: actions/checkout@v4

      - name: Install Ogoron
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ogoron"
          curl -fsSL "$OGORON_BUNDLE_URL" -o "$RUNNER_TEMP/ogoron/ogoron-linux-amd64.tar.gz"
          tar -xzf "$RUNNER_TEMP/ogoron/ogoron-linux-amd64.tar.gz" -C "$RUNNER_TEMP/ogoron"
          echo "$RUNNER_TEMP/ogoron/runtime" >> "$GITHUB_PATH"

      - name: Restore UI runtime cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .ogoron/tests/.venv
            ~/.cache/ms-playwright
          key: ${{ format('ogoron-ui-{0}-{1}-{2}', runner.os, env.OGORON_CLI_VERSION, hashFiles('.ogoron/tests/pyproject.toml')) }}

      - name: Run Ogoron tests
        env:
          OGORON_REPO_TOKEN: ${{ secrets.OGORON_REPO_TOKEN }}
          OGORON_LLM_API_KEY: ${{ secrets.OGORON_LLM_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          if ogoron-nuitka run tests 2>&1 | tee "$log_file"; then
            exit 0
          fi

          if grep -Eq "No generated unit tests directory was found\\.|No generated unit test batches were found\\.|No generated unit test files were found" "$log_file"; then
            echo "Skipping unit tests: no generated unit tests are available yet."
            exit 0
          fi

          exit 1

  run-ui-tests:
    runs-on: ubuntu-latest
    needs: prepare-ui-runtime

    steps:
      - uses: actions/checkout@v4

      - name: Install Ogoron
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ogoron"
          curl -fsSL "$OGORON_BUNDLE_URL" -o "$RUNNER_TEMP/ogoron/ogoron-linux-amd64.tar.gz"
          tar -xzf "$RUNNER_TEMP/ogoron/ogoron-linux-amd64.tar.gz" -C "$RUNNER_TEMP/ogoron"
          echo "$RUNNER_TEMP/ogoron/runtime" >> "$GITHUB_PATH"

      - name: Restore UI runtime cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .ogoron/tests/.venv
            ~/.cache/ms-playwright
          key: ${{ format('ogoron-ui-{0}-{1}-{2}', runner.os, env.OGORON_CLI_VERSION, hashFiles('.ogoron/tests/pyproject.toml')) }}

      - name: Run Ogoron UI tests
        env:
          OGORON_REPO_TOKEN: ${{ secrets.OGORON_REPO_TOKEN }}
          OGORON_LLM_API_KEY: ${{ secrets.OGORON_LLM_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          generated_root=".ogoron/tests/tests/ui/generated"
          if [[ -d .ogoron/tests && -f .ogoron/tests/.venv/bin/python ]] && find "$generated_root" -type f -name 'test_*.py' | grep -q .; then
            ogoron-nuitka run ui-tests
          else
            echo "Skipping UI tests: no generated UI tests are available yet."
          fi
