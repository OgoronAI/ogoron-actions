name: self-test

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run bootstrap smoke test without PR
        uses: ./setup
        env:
          OGORON_REPO_TOKEN: dummy
        with:
          create-pr: "false"
          analyze-business: "false"

      - name: Run exec smoke test
        uses: ./exec
        env:
          OGORON_REPO_TOKEN: dummy
        with:
          commands: |
            ogoron --version
